appId: com.jordancunningham.edunifiedapp
productName: ED Unified
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
asarUnpack:
  - resources/**
win:
  target:
    - target: nsis
      arch:
        - x64
  executableName: ed-unified-app
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
protocols:
  - name: ED Unified Import
    schemes:
      - edtoolapp
mac:
  target: dmg
  category: public.app-category.utilities
linux:
  target: AppImage
  category: Utility
