appId: com.jordancunningham.edunifiedapp
productName: ED Unified
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
# Bundled app assets (e.g. the default ED Tools icon) land next to the asar in
# process.resourcesPath/resources; see bundledResourcePath() in db.ts.
extraResources:
  - from: resources
    to: resources
asarUnpack:
  - resources/**
win:
  target:
    - target: nsis
      arch:
        - x64
  executableName: ed-unified-app
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
protocols:
  - name: ED Unified Import
    schemes:
      - edtoolapp
mac:
  target: dmg
  category: public.app-category.utilities
linux:
  target: AppImage
  category: Utility
  executableName: ed-unified-app
  artifactName: ${productName}-${version}.${ext}
  synopsis: Unified browser and launcher for Elite Dangerous third-party tools
  # Keeps the .desktop entry's WM_CLASS in sync so desktop environments
  # associate running windows with the launcher entry.
  syncDesktopName: true
