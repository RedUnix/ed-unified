# Builds the Windows installer and Linux AppImage. Pushing a v* tag attaches
# both to a draft GitHub Release (review + publish manually); manual runs
# (workflow_dispatch) just upload build artifacts. The AppImage must be built
# on Linux -- AppImage assembly creates symlinks, which Windows only allows
# with elevation or Developer Mode.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: build:win
          - os: ubuntu-latest
            script: build:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # --publish never: electron-builder would otherwise auto-publish on tag
      # builds when GITHUB_TOKEN is present; the release step below owns that.
      - run: npm run ${{ matrix.script }} -- --publish never
      - name: Attach artifacts to draft release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            release/*-setup.exe
            release/*.AppImage
      - name: Upload build artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            release/*-setup.exe
            release/*.AppImage
